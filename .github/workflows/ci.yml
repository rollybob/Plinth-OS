name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  # TCG on shared CI runners is slower than a local machine.
  PLINTH_QEMU_TIMEOUT: "180"

jobs:
  qemu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86

      # rust-toolchain.toml pins nightly + rust-src; the rustup proxy
      # installs it on first cargo invocation.
      - name: Install toolchain
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          # Keyed on the toolchain too: artifacts built by a different
          # rustc must not be restored after a toolchain change.
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Clobber lint
        run: cargo xtask check

      - name: Kernel test suite (in QEMU)
        run: cargo xtask test

      - name: Boot smoke test (in QEMU)
        run: cargo xtask smoke

      - name: Multi-core smoke test (in QEMU)
        run: cargo xtask smoke-smp
